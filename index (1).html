<script>

function uploadPhoto(){

var file = document.getElementById("upload").files[0]

if(file){

var reader = new FileReader()

reader.onload = function(e){

document.getElementById("profile").src = e.target.result

}

reader.readAsDataURL(file)

}

}

</script>
