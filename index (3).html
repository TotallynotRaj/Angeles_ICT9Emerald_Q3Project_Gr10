<!DOCTYPE html>
<html>
<head>

<title>Fare Matrix</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:url("https://img.itch.zone/aW1hZ2UvODU1MTkyLzQ3OTc3MDUuZ2lm/original/mNPGm0.gif");
background-size:cover;
color:white;
}

.container{
background:rgba(0,0,0,0.8);
padding:30px;
border-radius:10px;
margin-top:80px;
}

</style>

<script>

var baseFare = 50
var perKMrate = 15
var baseKM = 2

function computeFare(){

var pickup = document.getElementById("pickup").value
var dropoff = document.getElementById("dropoff").value

var distance = Math.abs(dropoff - pickup) + 1

var extraKM = Math.max(distance - baseKM,0)

var total = baseFare + (extraKM * perKMrate)

document.getElementById("fareOutput").innerHTML = total

}

</script>

</head>

<body>

<nav class="navbar navbar-expand-sm navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand">
<img src="https://cdn-icons-png.flaticon.com/512/5570/5570870.png" height="50">
</a>

<ul class="navbar-nav me-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="registration.html">Registration</a>
</li>

<li class="nav-item">
<a class="nav-link" href="Fare.html">Fare</a>
</li>

</ul>

</div>
</nav>

<div class="container">

<h2>StarRide Fare Matrix</h2>

<label>Pick-up Planet</label>

<select id="pickup" class="form-control">

<option value="0">Mercury</option>
<option value="1">Venus</option>
<option value="2">Earth</option>
<option value="3">Mars</option>
<option value="4">Jupiter</option>

</select>

<br>

<label>Destination Planet</label>

<select id="dropoff" class="form-control">

<option value="0">Mercury</option>
<option value="1">Venus</option>
<option value="2">Earth</option>
<option value="3">Mars</option>
<option value="4">Jupiter</option>

</select>

<br>

<button onclick="computeFare()" class="btn btn-warning">
Calculate Fare
</button>

<h3 class="mt-4">
Fare: ₱ <span id="fareOutput">0</span>
</h3>

<br>

<a href="Confirmation.html" class="btn btn-success">
Finish
</a>

</div>

</body>
</html>
